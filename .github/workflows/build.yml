name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos --depth=1
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        echo "$HOME/theos/vendor/lib/CydiaSubstrate.framework" >> $GITHUB_PATH

    - name: Download SDK
      run: |
        curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz -o /tmp/sdk.tar.xz
        mkdir -p $HOME/theos/sdks
        tar -xzf /tmp/sdk.tar.xz -C $HOME/theos/sdks

    - name: Build & Sign 🔏
      run: |
        make clean
        make package THEOS="$THEOS" ARCHS="arm64" FAKEROOT=""

    - name: Create Release
      run: |
        mkdir -p release
        cp packages/*.deb release/ 2>/dev/null || true
        echo "Signed by: dyilb" > release/signature.txt
        date >> release/signature.txt

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-tweak
        path: release/
