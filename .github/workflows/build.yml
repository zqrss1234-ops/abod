name: Build & Sign

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        brew install ldid xz

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos --depth=1
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Download SDK
      run: |
        curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz -o /tmp/sdk.tar.xz
        mkdir -p $HOME/theos/sdks
        tar -xzf /tmp/sdk.tar.xz -C $HOME/theos/sdks

    - name: Build Tweak
      run: |
        make clean
        make THEOS="$THEOS"

    - name: Package .deb
      run: |
        DYLIB=$(find .theos -name "abdulilah.dylib" -type f ! -name "*.unsigned" | head -1)
        if [ -z "$DYLIB" ]; then
          echo "❌ No dylib found!"
          find .theos -name "*.dylib" 2>/dev/null
          exit 1
        fi
        echo "📦 Using dylib: $DYLIB"
        mkdir -p packages pkg/DEBIAN pkg/Library/MobileSubstrate/DynamicLibraries
        cp control pkg/DEBIAN/
        cp "$DYLIB" pkg/Library/MobileSubstrate/DynamicLibraries/
        cp abdulilah.plist pkg/Library/MobileSubstrate/DynamicLibraries/
        cd pkg/DEBIAN && tar -czf ../../control.tar.gz . && cd ../..
        tar -czf data.tar.gz -C pkg Library
        echo "2.0" > debian-binary
        ar -rcs packages/abdulilah_2.0_iphoneos-arm.deb debian-binary control.tar.gz data.tar.gz
        rm -rf pkg debian-binary control.tar.gz data.tar.gz
        ls -la packages/

    - name: Create Release
      run: |
        mkdir -p release
        cp packages/*.deb release/ 2>/dev/null || true
        echo "Signed by: dyilb" > release/signature.txt
        date >> release/signature.txt

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: abdulilah-tweak
        path: release/
